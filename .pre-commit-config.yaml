repos:
  - repo: local
    hooks:
      - id: generate-sync
        name: Generate Synchronous API
        entry: uv run python3 scripts/generate_sync.py
        language: system
        files: ^src/pyarr/_async/.*\.py$
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.9.0
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, yarl, backoff, overrides, types-toml]
        args: [--show-error-codes, --ignore-missing-imports]
