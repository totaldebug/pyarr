---

version: '3'
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/sonarr/config.xml:/config/config.xml:rw
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/radarr/config.xml:/config/config.xml:rw
    ports:
      - 7878:7878
    restart: unless-stopped

#  readarr:
#    image: lscr.io/linuxserver/readarr:develop
#    container_name: readarr
#    environment:
#      - PUID=1001
#      - PGID=123
#      - TZ=Europe/London
#    volumes:
#      - ../tests/docker_configs/readarr/config.xml:/config/config.xml:rw
#    ports:
#      - 8787:8787
#    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/lidarr/config.xml:/config/config.xml:rw
    ports:
      - 8686:8686
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/prowlarr/config.xml:/config/config.xml:rw
    ports:
      - 9696:9696
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/bazarr/config/config.yaml:/config/config.yaml:rw
    ports:
      - 6767:6767
    restart: unless-stopped

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/whisparr/config.xml:/config/config.xml:rw
    ports:
      - 6969:6969
    restart: unless-stopped

  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    environment:
      - DISPATCHARR_ENV=aio
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/dispatcharr/jwt:/data/jwt:rw
    ports:
      - 9191:9191
    restart: unless-stopped

  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    environment:
      - PUID=1001
      - PGID=123
      - TZ=Europe/London
    volumes:
      - ../tests/docker_configs/deluge/core.conf:/config/core.conf:rw
    ports:
      - 8112:8112
    restart: unless-stopped
